# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:

# Frontend
frontend:
  themes: !include_dir_merge_named themes

# Added 20230426 after HA halting twice in 2 weeks, set max_entries to 500
system_log:
  max_entries: 500

# https://github.com/jcwillox/hass-auto-backup/issues/9
logger:
  default: warn
  logs:
    supervisor.snapshots: info
    homeassistant.components.recorder: info
    homeassistant.components.sensor.sql: info
    custom_components.auto_backup: debug
    homeassistant.components.shell_command: debug
    # New
    homeassistant.core: info
    # https://community.home-assistant.io/t/supervisor-log-entries-in-home-assistant-log/292522
    supervisor.hardware.monitor: info
    homeassistant.supervisor: info
    supervisor.hardware: info
    supervisor: info
    # 20241218: To check for errors with SMA-integration.
    #homeassistant.components.sma: debug

# Recorder is enabled by default.
recorder:
  db_url: !secret recorder_db_url
  purge_keep_days: 10
  #auto_purge: true
  commit_interval: 30
  exclude:
    entities:
      # 20230312. We excluded these that do not have any purpose.
      #- sensor.sn_3006917520_current_total not needed to be excluded as of 20260328 (earlier, look into sma.yaml).
      - sensor.metering_total_yield_compensation
      # We exclude systemair sensors that are related to the rest-response. Not needed in database as we create sensors based on the response.
      - sensor.systemair_save_connect_response_1_part
      - sensor.systemair_save_connect_response_2_part
      - sensor.systemair_save_connect_response_3_part
      - sensor.systemair_save_connect_response_4_part
      - sensor.systemair_save_connect_response
      - sensor.systemair_save_connect_response_priority
      # We exclude log-sensor data as it is own for viewing, not history. As of 20260328.
      - sensor.home_assistant_copy_backup_log
      - sensor.home_assistant_backup_to_server1
      - sensor.server1_influxdb_backup_log
      - sensor.server1_grafana_backup_log
      - sensor.server1_backup_to_nas_log
      - sensor.server1_influxdb_export_yesterday_log

# Logbook is enabled by default.
logbook:

# History is enabled by default.
history:
# Obsolete since 2024.5
#  exclude:
#    domains:
#      # Updater: Is not required in history data.
#      #- updater. Depreceated in 2022.3.3?
#    entity_globs:
#      # We do not include any of the test_-sensors.
#      - binary_sensor.test_*
#      - sensor.test_*

# We utilize InfluxDB as state-history database.
influxdb:
  api_version: 2
  ssl: false
  host: 192.168.2.30
  port: 8086
  organization: lite
  bucket: ha
  token: !secret history_db_token
  max_retries: 3
  exclude:
    # Updated 20260328 after a session with Claude, to reduce CPU load with EntityFilter.__call__() for each event.
    # ---------------------------------------------------------------
    # TIER 1: Domain-level exclusions (O(1) hash lookup, cheapest)
    # ---------------------------------------------------------------
    domains:
      - automation # All automations excluded as of 20260315
      - input_text # All input_text arrays excluded
      - climate # All climate entities excluded (Adax + nbp6013h)
      - sun # sun.sun as of 20250825
      - update # As of 20260328
    # ---------------------------------------------------------------
    # TIER 2: Globs — only where 6+ entities share a genuine pattern
    # ---------------------------------------------------------------
    entity_globs:
      # Test sensors — unknown count, glob justified
      - binary_sensor.test_*
      - sensor.test_*
      # SMA metering: current L1/L2/L3 base + stats (12 entities)
      - sensor.metering_current_l*
      - sensor.sma_metering_current_l*
      # SMA metering: active power draw L1/L2/L3 base + stats (12 entities)
      - sensor.metering_active_power_draw_l*
      - sensor.sma_metering_active_power_draw_*
      # SMA metering: active power feed L1/L2/L3 base + stats (12 entities)
      - sensor.metering_active_power_feed_l*
      - sensor.sma_metering_active_power_feed_*
      # SMA PV: current and power stats for strings A+B (6 entities each)
      - sensor.sma_pv_current_*
      - sensor.sma_pv_power_*
      # Systemair: all response/status sensors (7 entities)
      - sensor.systemair_save_connect_*
      # Shelly: heatpumps livingroom + upstairs + total (11 entities)
      # Note: no trailing underscore — catches both shelly_heatpump_ and shelly_heatpumps_
      - sensor.shelly_heatpump*
      # Shelly: heat exchanger (6 entities)
      - sensor.shelly_heat_exchanger_*
      # Shelly: spa all phases and totals (18 entities)
      - sensor.shelly_spa_*
      # Shelly: water heater all phases and totals (14 entities)
      - sensor.shelly_water_heater_*
      # Server1: datetime snapshot sensors (7 entities)
      - sensor.server1_*_datetime
      # All iphone sensors are removed (10+) as of 20260328.
      - sensor.iphone*
    # ---------------------------------------------------------------
    # TIER 3: Exact entity IDs — O(1) set lookup, no regex cost
    # ---------------------------------------------------------------
    entities:
      # SMA metering: power absorbed base + stats (4 entities, not worth a glob)
      - sensor.metering_power_absorbed
      - sensor.sma_metering_power_absorbed_min
      - sensor.sma_metering_power_absorbed_mean
      - sensor.sma_metering_power_absorbed_max
      # SMA metering: frequency base + stats
      - sensor.metering_frequency
      - sensor.sma_metering_frequency_min
      - sensor.sma_metering_frequency_mean
      - sensor.sma_metering_frequency_max
      # SMA: grid power base + stats
      - sensor.grid_power
      - sensor.sma_grid_power_min
      - sensor.sma_grid_power_mean
      - sensor.sma_grid_power_max
      # SMA metering: power supplied base + stats
      - sensor.metering_power_supplied
      - sensor.sma_metering_power_supplied_min
      - sensor.sma_metering_power_supplied_mean
      - sensor.sma_metering_power_supplied_max
      # SMA PV: base current and power (stats covered by globs above)
      - sensor.pv_current_a
      - sensor.pv_current_b
      - sensor.pv_power_a
      - sensor.pv_power_b
      # SMA metering: totals and yield
      - sensor.metering_total_absorbed
      - sensor.metering_total_absorbed_cost
      - sensor.metering_total_yield
      - sensor.metering_total_yield_compensation
      - sensor.pv_gen_meter
      - sensor.total_yield
      - sensor.daily_yield
      - sensor.sma_total_power_used_by_house
      # Adax: room energy sensors
      - sensor.kok_energi
      - sensor.toalett_energi
      - sensor.vardagsrum_energi
      - sensor.badrum_energi
      - sensor.sovrum_energi
      # Miscellaneous individual sensors
      - sensor.sn_3006917520_current_total
      - sensor.ehs4plem_status
      - weather.smhi_home
      - binary_sensor.ehs4plem_online
      - binary_sensor.nbp6013h_filter1
      - binary_sensor.nbp6013h_filter2
      # We exclude log-sensor data as it is own for viewing, not history. As of 20260328.
      - sensor.home_assistant_copy_backup_log
      - sensor.home_assistant_backup_to_server1
      - sensor.server1_influxdb_backup_log
      - sensor.server1_grafana_backup_log
      - sensor.server1_backup_to_nas_log
      - sensor.server1_influxdb_export_yesterday_log

notify:
  - name: email_notification
    platform: smtp
    server: !secret email_server
    port: 587
    timeout: 15
    sender: !secret email_email_from
    recipient: !secret email_email_to
    starttls: true
    username: !secret email_email_from
    password: !secret email_password

# Text to speech
tts:
  - platform: google_translate

sensor: !include sensors.yaml
group: !include groups.yaml
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

homeassistant:
  allowlist_external_dirs:
    - "/config/logs"
  packages:
    home_assistant: !include packages/home_assistant.yaml
    backup: !include packages/backup.yaml
    database_table_sizes: !include packages/database_table_sizes.yaml
    domains_entities: !include packages/domains_entities.yaml
    github_push: !include packages/github_push.yaml
    grafana_github_push: !include packages/grafana_github_push.yaml
    server1: !include packages/server1.yaml
    server1_github_push: !include packages/server1_github_push.yaml
    weather: !include packages/weather.yaml
    sma: !include packages/sma.yaml
    tariff_electrical: !include packages/tariff_electrical.yaml
    balboa_spa: !include packages/balboa_spa.yaml
    charger: !include packages/charger.yaml
    systemair: !include packages/systemair.yaml
    adax: !include packages/adax.yaml
    shelly: !include packages/shelly.yaml

shell_command:
  # We run copy_backup as background process, since otherwise HA will terminate the process after 60 seconds.
  copy_backup: /config/scripts/copy_backup.sh pi@192.168.2.30 /srv/ha/backup &
  copy_logfile: /config/scripts/copy_logfile.sh
  github_push: /config/scripts/github_push.sh "{{ value }}"
  grafana_github_push: /config/scripts/grafana_github_push.sh pi@192.168.2.30 192.168.2.30:3000 "{{ value }}"
  server1_github_push: /config/scripts/server1_github_push.sh pi@192.168.2.30 "{{ value }}"
