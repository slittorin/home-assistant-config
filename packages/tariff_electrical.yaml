        entity_id: input_number.electrical_daily_sum_consumption_intake_hour_persistent
        value: "{{ states('sensor.electrical_daily_sum_consumption_intake_hour') }}"

  # We want to track the intake consumption each 15 minute during the hour.
  - id: automation_electrical_consumption_intake_array
    alias: "Automation related to electrical_consumption_intake_array"
    trigger:
      - platform: time_pattern
        minutes: "14"
        seconds: "56"
      - platform: time_pattern
        minutes: "29"
        seconds: "56"
      - platform: time_pattern
        minutes: "44"
        seconds: "56"
      - platform: time_pattern
        minutes: "59"
        seconds: "56"
    action:
      - service: input_text.set_value
        target:
          entity_id: input_text.electrical_consumption_intake_array
        data:
          value: >-
            {% set current_array = states('input_text.electrical_consumption_intake_array') %}
            {% set current_consumption = states(states('input_text.electrical_consumption_sensor')) %}
            {% set current_minute = now().minute %}
            {% set inputs_valid = true %}
            {% set result = none %}
            {% if (current_array == 'unknown' or current_array == 'unavailable' or current_array == 'none' or current_array == None or current_array == "") %}
            {%   set current_array = "[0,0,0,0]" %}
            {% endif %}
            {% set current_array = current_array | from_json %}
            {% if (current_consumption == 'unknown' or current_consumption == 'unavailable') %}
            {%   set inputs_valid = false %}
            {% else %}
            {%   set current_consumption = current_consumption | float %}
            {% endif %}
            {% if (inputs_valid == true) %}
            {%   if (current_minute < 15) %}
            {%     set new_array = [current_consumption] + [current_array[1]] + [current_array[2]] + [current_array[3]] %}
            {%   elif (current_minute >= 15 and current_minute < 30) %}
            {%     set new_array = [current_array[0]] + [current_consumption] + [current_array[2]] + [current_array[3]] %}
            {%   elif (current_minute >= 30 and current_minute < 45) %}
            {%     set new_array = [current_array[0]] + [current_array[1]] + [current_consumption] + [current_array[3]] %}
            {%   elif (current_minute >= 45) %}
            {%     set new_array = [current_array[0]] + [current_array[1]] + [current_array[2]] + [current_consumption] %}
            {%   endif %}
            {%   set result = new_array %}
            {% else %}
            {%   set result = current_array %}
            {% endif %}
            {{ result | tojson }}

  # We want to track the intake consumption cost each 15 minute during the hour.
  # We perform this after electrical_consumption_intake_array is set.
  - id: automation_electrical_consumption_intake_cost_array
    alias: "Automation related to electrical_consumption_intake_cost_array"
    trigger:
      - platform: time_pattern
        minutes: "14"
        seconds: "57"
      - platform: time_pattern
        minutes: "29"
        seconds: "57"
      - platform: time_pattern
        minutes: "44"
        seconds: "57"
      - platform: time_pattern
        minutes: "59"
        seconds: "57"
    action:
      - service: input_text.set_value
        target:
          entity_id: input_text.electrical_consumption_intake_cost_array
        data:
          value: >-
            {% set current_consumption_array = states('input_text.electrical_consumption_intake_array') %}
            {% set current_cost_array = states('input_text.electrical_consumption_intake_cost_array') %}
            {% set rate_distribution = states('sensor.electrical_distribution_rate_summary') %}
            {% set rate_consumption = states('sensor.electrical_consumption_rate_summary') %}
            {% set current_minute = now().minute %}
            {% set inputs_valid = true %}
            {% set result = none %}
            {% if (current_consumption_array == 'unknown' or current_consumption_array == 'unavailable' or current_consumption_array == 'none' or current_consumption_array == None or current_consumption_array == "") %}
            {%   set current_consumption_array = "[0,0,0,0]" %}
            {% endif %}
            {% if (current_cost_array == 'unknown' or current_cost_array == 'unavailable' or current_cost_array == 'none' or current_cost_array == None or current_cost_array == "") %}
            {%   set current_cost_array = "[0,0,0,0,0]" %}
            {% endif %}
            {% if (rate_distribution == 'unknown' or rate_distribution == 'unavailable') %}
            {%   set inputs_valid = false %}
            {% else %}
            {%   set rate_distribution = float(rate_distribution, 0) %}
            {% endif %}
            {% if (rate_consumption == 'unknown' or rate_consumption == 'unavailable') %}
            {%   set inputs_valid = false %}
            {% else %}
            {%   set rate_consumption = float(rate_consumption, 0) %}
            {% endif %}
            {% set current_consumption_array = current_consumption_array | from_json %}
            {% set current_cost_array = current_cost_array | from_json %}
            {% if (inputs_valid == true) %}
            {%   if (current_minute < 15) %}
            {%     set delta_consumption = current_consumption_array[0] - current_consumption_array[3] %}
            {%     if (delta_consumption < 0 or current_consumption_array[0] == 0 or current_consumption_array[3] == 0) %}
            {%       set new_cost_array = current_cost_array %}
            {%     else %}
            {%       set delta_cost = (((rate_distribution + rate_consumption)/100) * delta_consumption) | round(5, default=0) %}
            {%       set sum_cost = (delta_cost + current_cost_array[1] + current_cost_array[2] + current_cost_array[3]) | round(5, default=0) %}
            {%       set new_cost_array = [delta_cost] + [current_cost_array[1]] + [current_cost_array[2]] + [current_cost_array[3]] + [sum_cost] %}
            {%     endif %}
            {%   elif (current_minute >= 15 and current_minute < 30) %}
            {%     set delta_consumption = current_consumption_array[1] - current_consumption_array[0] %}
            {%     if (delta_consumption < 0 or current_consumption_array[1] == 0 or current_consumption_array[0] == 0) %}
            {%       set new_cost_array = current_cost_array %}
            {%     else %}
            {%       set delta_cost = (((rate_distribution + rate_consumption)/100) * delta_consumption) | round(5, default=0) %}
            {%       set sum_cost = (current_cost_array[0] + delta_cost + current_cost_array[2] + current_cost_array[3]) | round(5, default=0) %}
            {%       set new_cost_array = [current_cost_array[0]] + [delta_cost] + [current_cost_array[2]] + [current_cost_array[3]] + [sum_cost] %}
            {%     endif %}
            {%   elif (current_minute >= 30 and current_minute < 45) %}
            {%     set delta_consumption = current_consumption_array[2] - current_consumption_array[1] %}
            {%     if (delta_consumption < 0 or current_consumption_array[2] == 0 or current_consumption_array[1] == 0) %}
            {%       set new_cost_array = current_cost_array %}
            {%     else %}
            {%       set delta_cost = (((rate_distribution + rate_consumption)/100) * delta_consumption) | round(5, default=0) %}
            {%       set sum_cost = (current_cost_array[0] + current_cost_array[1] + delta_cost + current_cost_array[3]) | round(5, default=0) %}
            {%       set new_cost_array = [current_cost_array[0]] + [current_cost_array[1]] + [delta_cost] + [current_cost_array[3]] + [sum_cost] %}
            {%     endif %}
            {%   elif (current_minute >= 45) %}
            {%     set delta_consumption = current_consumption_array[3] - current_consumption_array[2] %}
            {%     if (delta_consumption < 0 or current_consumption_array[3] == 0 or current_consumption_array[2] == 0) %}
            {%       set new_cost_array = current_cost_array %}
            {%     else %}
            {%       set delta_cost = (((rate_distribution + rate_consumption)/100) * delta_consumption) | round(5, default=0) %}
            {%       set sum_cost = (current_cost_array[0] + current_cost_array[1] + current_cost_array[2] + delta_cost) | round(5, default=0) %}
            {%       set new_cost_array = [current_cost_array[0]] + [current_cost_array[1]] + [current_cost_array[2]] + [delta_cost] + [sum_cost] %}
            {%     endif %}
            {%   endif %}
            {%   set result = new_cost_array %}
            {% else %}
            {%   set result = current_cost_array %}
            {% endif %}
            {{ result | tojson }}

