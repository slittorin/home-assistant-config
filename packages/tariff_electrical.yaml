# This file includes all the entities for the electrical tariffs.

# Also linked to configuration made for the energy integration.

# Updates made for Core updates and breaking changes:
# --------------------------------------------------------
# 20221108 - Clear to upgrade to 2022.6.7 from 2022.5.3: https://www.home-assistant.io/blog/2022/06/01/release-20226/#breaking-changes Template filter/function defaults
#
# --------------------------------------------------------------------------------------------------------------------
# At 1 oktober 2025 Sweden went over to 15 minutes interval for pricing of consumption of electricity.
# To accomodate this we needed to do some changes:
# - We created several new sensors to measure the consumption and cost correctly each 15 minutes.
# - We adapted the hourly sensors to summmarize the last hours summary (4x15 minutes).
#   This as we wanted to keep the hourly measurement.
# - We changeed the HACS Nordpool-component. See below.
#
# The HACS Nordpool-component has not of this date (20251016) been adapted to meet the 15 minute interval.
# (we do not use the official Nordpool-component as it does not hold the attributes we require for our sensors)
# Therefore we needed to perform a few changes directly in the code at /config/custom_components/nordpool:
# 1. Change according to the following proposed pull-request: https://github.com/custom-components/nordpool/pull/491
#    - https://github.com/custom-components/nordpool/pull/491/commits/5c152177aa59e357f886c841c7d23f738c9d935a
#    - https://github.com/custom-components/nordpool/pull/491/commits/1df0aaa357044b6ed64453cf7d9e9452d498e99a
# 2. Since we also get error 'WARNING (Recorder) [homeassistant.components.recorder.db_schema] State attributes for sensor.nordpool_kwh_se3_sek_3_10_0 exceed maximum size of 16384 bytes.' in the log, we also remove the attribute 'raw_today' and 'raw_tomorrow':
#    - We do not need these attributes for any sensor.
#    - In file 'sensor.py':
#      - Remove the following two lines (in 'def extra_state_attributes(self) -> dict:'):
#          "tomorrow_valid": self.tomorrow_valid,
#          "raw_today": self.raw_today,
#
# Due to the change in step 2, we also changed the ApexChart-plugin and data_generator from:
#    data_generator: |
#      return [
#      ...entity.attributes.raw_today.map((start, index) => {
#        return [new Date(start["start"]).getTime(), ((entity.attributes.raw_today[index]["value"]*100)+(hass.states['input_number.electrical_consumption_rate_compensation_manual'].state*1)+(hass.states['input_number.electrical_consumption_rate_tax'].state*1))*(1+((hass.states['input_number.electrical_consumption_rate_vat'].state*1)/100))];
#      }),
#      ...entity.attributes.raw_tomorrow.map((start, index) => {
#        return [new Date(start["start"]).getTime(), ((entity.attributes.raw_tomorrow[index]["value"]*100)+(hass.states['input_number.electrical_consumption_rate_compensation_manual'].state*1)+(hass.states['input_number.electrical_consumption_rate_tax'].state*1))*(1+((hass.states['input_number.electrical_consumption_rate_vat'].state*1)/100))];
#      })
#      ];
# to
#      const vat = (1 + (hass.states['input_number.electrical_consumption_rate_vat'].state * 1) / 100);
#      const comp = hass.states['input_number.electrical_consumption_rate_compensation_manual'].state * 1;
#      const tax = hass.states['input_number.electrical_consumption_rate_tax'].state * 1;
#      const todayValues = entity.attributes.today || [];
#      const tomorrowValues = entity.attributes.tomorrow || [];
#      const baseToday = new Date();
#      baseToday.setHours(0, 0, 0, 0);
#      const baseTomorrow = new Date(baseToday);
#      baseTomorrow.setDate(baseTomorrow.getDate() + 1);
#      const intervalMinutes = 15;
#      const todayData = todayValues.map((value, index) => {
#        const timestamp = new Date(baseToday.getTime() + index * intervalMinutes * 60000).getTime();
#        const adjustedValue = ((value * 100) + comp + tax) * vat;
#        return [timestamp, adjustedValue];
#      });
#      const tomorrowData = tomorrowValues.map((value, index) => {
#        const timestamp = new Date(baseTomorrow.getTime() + index * intervalMinutes * 60000).getTime();
#        const adjustedValue = ((value * 100) + comp + tax) * vat;
#        return [timestamp, adjustedValue];
#      });
#      return [...todayData, ...tomorrowData];
# --------------------------------------------------------------------------------------------------------------------

sensor:
  # For spotprices, we get all the data from Nordpool, for my region and currency.
  # We still use HACS version 20241217 since the HA-supported version does not have all the data we need.
  - platform: nordpool
    region: "SE3"
    # We calculate with VAT ourselves.
    VAT: False
    currency: "SEK"
    precision: 3
    price_type: kWh

# All the below is related to keep track of the true electrical rate and income of the solar panels.
input_number:
  electrical_distribution_rate:
    name: "Electrical distribution rate (before tax and VAT)"
    icon: mdi:transmission-tower
    mode: box
    min: 0
    step: 0.001
    max: 1000
    unit_of_measurement: "öre/kWh"
  electrical_distribution_rate_tax:
    name: "Electrical distribution rate tax"
    icon: mdi:transmission-tower
    mode: box
    min: 0
    step: 0.001
    max: 1000
    unit_of_measurement: "öre/kWh"
  electrical_distribution_rate_vat:
    name: "Electrical distribution rate VAT"
    icon: mdi:transmission-tower
    mode: box
    min: 0
    step: 0.001
    max: 1000
    unit_of_measurement: "%"
  electrical_consumption_rate_manual:
    name: "Electrical consumption manual rate (before tax and VAT)"
    icon: mdi:transmission-tower-import
    mode: box
    min: 0
    step: 0.001
    max: 1000
    unit_of_measurement: "öre/kWh"
  electrical_consumption_rate_compensation_manual:
    name: "Electrical consumption rate manual compensation (before tax and VAT)"
    icon: mdi:transmission-tower-import
    mode: box
    min: -1000
