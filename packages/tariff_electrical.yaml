            {%   elif (current_minute >= 30 and current_minute < 45) %}
            {%     set delta_consumption = current_consumption_array[2] - current_consumption_array[1] %}
            {%     if (delta_consumption < 0 or current_consumption_array[2] == 0 or current_consumption_array[1] == 0) %}
            {%       set new_cost_array = current_cost_array %}
            {%     else %}
            {%       set delta_yield = (delta_consumption * (yield_summary/100)) | round(5, default=0) %}
            {%       set sum_cost = (current_cost_array[0] + current_cost_array[1] + delta_yield + current_cost_array[3]) | round(5, default=0) %}
            {%       set new_cost_array = [current_cost_array[0]] + [current_cost_array[1]] + [delta_yield] + [current_cost_array[3]] + [sum_cost] %}
            {%     endif %}
            {%   elif (current_minute >= 45) %}
            {%     set delta_consumption = current_consumption_array[3] - current_consumption_array[2] %}
            {%     if (delta_consumption < 0 or current_consumption_array[3] == 0 or current_consumption_array[2] == 0) %}
            {%       set new_cost_array = current_cost_array %}
            {%     else %}
            {%       set delta_yield = (delta_consumption * (yield_summary/100)) | round(5, default=0) %}
            {%       set sum_cost = (current_cost_array[0] + current_cost_array[1] + current_cost_array[2] + delta_yield) | round(5, default=0) %}
            {%       set new_cost_array = [current_cost_array[0]] + [current_cost_array[1]] + [current_cost_array[2]] + [delta_yield] + [sum_cost] %}
            {%     endif %}
            {%   endif %}
            {%   set result = new_cost_array %}
            {% else %}
            {%   set result = current_cost_array %}
            {% endif %}
            {{ result | tojson }}

  # We want to track the reduction from solar production each 15 minute during the hour.
  - id: automation_electrical_solar_production_hour_array
    alias: "Automation related to electrical_solar_production_hour_array"
    trigger:
      - platform: time_pattern
        minutes: "14"
        seconds: "56"
      - platform: time_pattern
        minutes: "29"
        seconds: "56"
      - platform: time_pattern
        minutes: "44"
        seconds: "56"
      - platform: time_pattern
        minutes: "59"
        seconds: "56"
    action:
      - service: input_text.set_value
        target:
          entity_id: input_text.electrical_solar_production_hour_array
        data:
          value: >-
            {% set current_array = states('input_text.electrical_solar_production_hour_array') %}
            {% set current_production = states(states('input_text.electrical_production_sensor')) %}
            {% set current_minute = now().minute %}
            {% set inputs_valid = true %}
            {% set result = none %}
            {% if (current_array == 'unknown' or current_array == 'unavailable' or current_array == 'none' or current_array == None or current_array == "") %}
            {%   set current_array = "[0,0,0,0]" %}
            {% endif %}
            {% set current_array = current_array | from_json %}
            {% if (current_production == 'unknown' or current_production == 'unavailable') %}
            {%   set inputs_valid = false %}
            {% else %}
            {%   set current_production = current_production | float %}
            {% endif %}
            {% if (inputs_valid == true) %}
            {%   if (current_minute < 15) %}
            {%     set new_array = [current_production] + [current_array[1]] + [current_array[2]] + [current_array[3]] %}
            {%   elif (current_minute >= 15 and current_minute < 30) %}
            {%     set new_array = [current_array[0]] + [current_production] + [current_array[2]] + [current_array[3]] %}
            {%   elif (current_minute >= 30 and current_minute < 45) %}
            {%     set new_array = [current_array[0]] + [current_array[1]] + [current_production] + [current_array[3]] %}
            {%   elif (current_minute >= 45) %}
            {%     set new_array = [current_array[0]] + [current_array[1]] + [current_array[2]] + [current_production] %}
            {%   endif %}
            {%   set result = new_array %}
            {% else %}
            {%   set result = current_array %}
            {% endif %}
            {{ result | tojson }}

  # We want to track the reduction from solar production (i.e. that we do not need to buy the electricity) each 15 minute during the hour.
  # We perform this after electrical_solar_production_hour_array and electrical_solar_yield_hour_array is set.
  - id: automation_electrical_solar_production_reduction_hour_array
    alias: "Automation related to electrical_solar_production_reduction_hour_array"
    trigger:
      - platform: time_pattern
        minutes: "14"
        seconds: "57"
      - platform: time_pattern
        minutes: "29"
        seconds: "57"
      - platform: time_pattern
        minutes: "44"
        seconds: "57"
      - platform: time_pattern
        minutes: "59"
        seconds: "57"
    action:
      - service: input_text.set_value
        target:
          entity_id: input_text.electrical_solar_production_reduction_hour_array
        data:
          value: >-
            {% set current_production_array = states('input_text.electrical_solar_production_hour_array') %}
            {% set current_yield_array = states('input_text.electrical_solar_yield_hour_array') %}
            {% set current_cost_array = states('input_text.electrical_solar_production_reduction_hour_array') %}
            {% set rate_distribution = states('sensor.electrical_distribution_rate_summary') %}
            {% set rate_consumption = states('sensor.electrical_consumption_rate_summary') %}
            {% set current_minute = now().minute %}
            {% set inputs_valid = true %}
            {% set result = none %}
            {% if (current_production_array == 'unknown' or current_production_array == 'unavailable' or current_production_array == 'none' or current_production_array == None or current_production_array == "") %}
            {%   set current_production_array = "[0,0,0,0]" %}
            {% endif %}
            {% if (current_yield_array == 'unknown' or current_yield_array == 'unavailable' or current_yield_array == 'none' or current_yield_array == None or current_yield_array == "") %}
            {%   set current_yield_array = "[0,0,0,0]" %}
            {% endif %}
            {% if (current_cost_array == 'unknown' or current_cost_array == 'unavailable' or current_cost_array == 'none' or current_cost_array == None or current_cost_array == "") %}
            {%   set current_cost_array = "[0,0,0,0,0]" %}
            {% endif %}
            {% if (rate_distribution == 'unknown' or rate_distribution == 'unavailable') %}
            {%   set inputs_valid = false %}
            {% else %}
            {%   set rate_distribution = float(rate_distribution, 0) %}
            {% endif %}
            {% if (rate_consumption == 'unknown' or rate_consumption == 'unavailable') %}
            {%   set inputs_valid = false %}
            {% else %}
            {%   set rate_consumption = float(rate_consumption, 0) %}
            {% endif %}
            {% set current_production_array = current_production_array | from_json %}
            {% set current_yield_array = current_yield_array | from_json %}
            {% set current_cost_array = current_cost_array | from_json %}
            {% if (inputs_valid == true) %}
            {%   if (current_minute < 15) %}
            {%     set delta_production = current_production_array[0] - current_production_array[3] %}
            {%     set delta_yield = current_yield_array[0] - current_yield_array[3] %}
            {%     if (delta_production < 0 or current_production_array[0] == 0 or current_production_array[3] == 0) %}
            {%       set inputs_valid = false %}
            {%     endif %}
            {%     if (delta_yield < 0 or current_yield_array[0] == 0 or current_yield_array[3] == 0) %}
            {%       set inputs_valid = false %}
            {%     endif %}
            {%     if (inputs_valid == true) %}
            {%       set delta_cost = (((rate_distribution + rate_consumption)/100) * (delta_production - delta_yield)) | round(5, default=0) %}
            {%       set sum_cost = (delta_cost + current_cost_array[1] + current_cost_array[2] + current_cost_array[3]) | round(5, default=0) %}
            {%       set new_cost_array = [delta_cost] + [current_cost_array[1]] + [current_cost_array[2]] + [current_cost_array[3]] + [sum_cost] %}
            {%     else %}
            {%       set new_cost_array = current_cost_array %}
            {%     endif %}
            {%   elif (current_minute >= 15 and current_minute < 30) %}
            {%     set delta_production = current_production_array[1] - current_production_array[0] %}
            {%     set delta_yield = current_yield_array[1] - current_yield_array[0] %}
            {%     if (delta_production < 0 or current_production_array[1] == 0 or current_production_array[0] == 0) %}
            {%       set inputs_valid = false %}
            {%     endif %}
            {%     if (delta_yield < 0 or current_yield_array[1] == 0 or current_yield_array[0] == 0) %}
            {%       set inputs_valid = false %}
            {%     endif %}
            {%     if (inputs_valid == true) %}
            {%       set delta_cost = (((rate_distribution + rate_consumption)/100) * (delta_production - delta_yield)) | round(5, default=0) %}
            {%       set sum_cost = (current_cost_array[0] + delta_cost + current_cost_array[2] + current_cost_array[3]) | round(5, default=0) %}
            {%       set new_cost_array = [current_cost_array[0]] + [delta_cost] + [current_cost_array[2]] + [current_cost_array[3]] + [sum_cost] %}
            {%     else %}
            {%       set new_cost_array = current_cost_array %}
            {%     endif %}
            {%   elif (current_minute >= 30 and current_minute < 45) %}
            {%     set delta_production = current_production_array[2] - current_production_array[1] %}
            {%     set delta_yield = current_yield_array[2] - current_yield_array[1] %}
            {%     if (delta_production < 0 or current_production_array[2] == 0 or current_production_array[1] == 0) %}
            {%       set inputs_valid = false %}
            {%     endif %}
            {%     if (delta_yield < 0 or current_yield_array[2] == 0 or current_yield_array[1] == 0) %}
            {%       set inputs_valid = false %}
            {%     endif %}
            {%     if (inputs_valid == true) %}
            {%       set delta_cost = (((rate_distribution + rate_consumption)/100) * (delta_production - delta_yield)) | round(5, default=0) %}
            {%       set sum_cost = (current_cost_array[0] + current_cost_array[1] + delta_cost + current_cost_array[3]) | round(5, default=0) %}
            {%       set new_cost_array = [current_cost_array[0]] + [current_cost_array[1]] + [delta_cost] + [current_cost_array[3]] + [sum_cost] %}
            {%     else %}
            {%       set new_cost_array = current_cost_array %}
            {%     endif %}
            {%   elif (current_minute >= 45) %}
            {%     set delta_production = current_production_array[3] - current_production_array[2] %}
            {%     set delta_yield = current_yield_array[3] - current_yield_array[2] %}
            {%     if (delta_production < 0 or current_production_array[3] == 0 or current_production_array[2] == 0) %}
            {%       set inputs_valid = false %}
            {%     endif %}
            {%     if (delta_yield < 0 or current_yield_array[3] == 0 or current_yield_array[2] == 2) %}
            {%       set inputs_valid = false %}
            {%     endif %}
            {%     if (inputs_valid == true) %}
            {%       set delta_cost = (((rate_distribution + rate_consumption)/100) * (delta_production - delta_yield)) | round(5, default=0) %}
            {%       set sum_cost = (current_cost_array[0] + current_cost_array[1] + current_cost_array[2] + delta_cost) | round(5, default=0) %}
            {%       set new_cost_array = [current_cost_array[0]] + [current_cost_array[1]] + [current_cost_array[2]] + [delta_cost] + [sum_cost] %}
            {%     else %}
            {%       set new_cost_array = current_cost_array %}
            {%     endif %}
            {%   endif %}
            {%   set result = new_cost_array %}
            {% else %}
            {%   set result = current_cost_array %}
            {% endif %}
            {{ result | tojson }}
