input_boolean:
  electrical_consumption_rate_toggle:
    name: "If enabled, manual consumption-rate, otherwise spot based consumption rate."
    icon: mdi:toggle-switch
  electrical_yield_rate_toggle:
    name: "If enabled, manual yield-rate, otherwise spot based yield rate."
    icon: mdi:toggle-switch

input_text:
  electrical_consumption_spot_sensor:
    name: "Name of sensor for spot-price and consumption (full name)"
    icon: mdi:home-import-outline
  electrical_yield_spot_sensor:
    name: "Name of sensor for spot-price and yield (full name)"
    icon: mdi:home-export-outline
  electrical_consumption_sensor:
    name: "Name of sensor for tracking total_increasing electrical consumption into the house in kWh (full name)"
    icon: mdi:home-import-outline
  electrical_production_sensor:
    name: "Name of sensor for tracking total_increasing electrical production in kWh (full name)"
    icon: mdi:solar-power
  electrical_yield_sensor:
    name: "Name of sensor for tracking total_increasing electrical yield (output to grid) in kWh (full name)"
    icon: mdi:home-export-outline
  # We want to track consumption each 15-minute during the hour
  # Index 0 through 3 is each 15 minute.
  # unit_of_measurement: "kWh"
  electrical_consumption_intake_array:
    name: "Array for calculating correct 15 minute consumption"
    icon: mdi:application-array-outline
  # We want to track consumption intake cost each 15-minute during the hour
  # Index 0 through 3 is each 15 minute.
  # Index 4 is the summary of cost for each 15 minute during the hour.
  # unit_of_measurement: "SEK"
  electrical_consumption_intake_cost_array:
    name: "Array for calculating correct 15 minute consumption cost"
    icon: mdi:application-array-outline
  # We want to track solary yield each 15-minute during the hour
  # Index 0 through 3 is each 15 minute.
  # unit_of_measurement: "kWh"
  electrical_solar_yield_hour_array:
    name: "Array for calculating correct 15 minute solary yield"
    icon: mdi:application-array-outline
  # We want to track solar yield return each 15-minute during the hour
  # Index 0 through 3 is each 15 minute.
  # Index 4 is the summary of cost for each 15 minute during the hour.
  # unit_of_measurement: "SEK"
  electrical_solar_yield_return_hour_array:
    name: "Array for calculating correct 15 minute solar yield return"
    icon: mdi:application-array-outline
  # We want to track reduction from solar production each 15-minute during the hour
  # Index 0 through 3 is each 15 minute.
  # unit_of_measurement: "kWh"
  electrical_solar_production_hour_array:
    name: "Array for calculating correct 15 minute reduction from solar production"
    icon: mdi:application-array-outline
  # We want to track the reduction from solar production (i.e. that we do not need to buy the electricity) each 15-minute during the hour
  # Index 0 through 3 is each 15 minute.
  # Index 4 is the summary of cost for each 15 minute during the hour.
  # unit_of_measurement: "SEK"
  electrical_solar_production_reduction_hour_array:
    name: "Array for calculating correct 15 minute reduction from solar production (i.e. that we do not need to buy the electricity)"
    icon: mdi:application-array-outline

template:
  - sensor:
      # We want to keep track of the consumption spot rate.
      # 20251011: This will be able to manage 15 minute changes when the NordPool-integration is updated.
      - name: Electrical consumption rate spot
        unique_id: electrical_consumption_rate_spot
        unit_of_measurement: "SEK/kWh"
        state_class: measurement
        icon: mdi:home-import-outline
        state: >
          {% set rate = states(states('input_text.electrical_consumption_spot_sensor')) %}
          {% if (rate == 'unknown' or rate == 'unavailable') %}
          {%   set rate = 0 %}
          {% else %}
          {%   set rate = float(rate, 0) %}
          {% endif %}
          {% set total_rate = rate | round(4, default=0) %}
          {{ total_rate }}

  - sensor:
      # We want to keep track of the distribution spot rate.
      # 20251011: This will be able to manage 15 minute changes when the NordPool-integration is updated.
      - name: Electrical yield rate spot
        unique_id: electrical_yield_rate_spot
        unit_of_measurement: "SEK/kWh"
        state_class: measurement
        icon: mdi:home-export-outline
        state: >
          {% set rate = states(states('input_text.electrical_yield_spot_sensor')) %}
          {% if (rate == 'unknown' or rate == 'unavailable') %}
          {%   set rate = 0 %}
          {% else %}
          {%   set rate = float(rate, 0) %}
          {% endif %}
          {% set total_rate = rate | round(4, default=0) %}
          {{ total_rate }}

  - sensor:
      # We want to keep track of total electrical distribution rate.
      # 20251011: Not affected by 15 minute changes when the NordPool-integration is updated.
      - name: Electrical distribution rate summary
        unique_id: electrical_distribution_rate_summary
        unit_of_measurement: "öre/kWh"
        state_class: measurement
        icon: mdi:transmission-tower
        state: >
          {% set rate = states('input_number.electrical_distribution_rate') %}
          {% if (rate == 'unknown' or rate == 'unavailable') %}
          {%   set rate = 0 %}
          {% else %}
          {%   set rate = float(rate, 0) %}
          {% endif %}
          {% set tax = states('input_number.electrical_distribution_rate_tax') %}
          {% if (tax == 'unknown' or tax == 'unavailable') %}
          {%   set tax = 0 %}
          {% else %}
          {%   set tax = float(tax, 0) %}
          {% endif %}
          {% set vat = states('input_number.electrical_distribution_rate_vat') %}
          {% if (vat == 'unknown' or vat == 'unavailable') %}
          {%   set vat = 0 %}
          {% else %}
          {%   set vat = float(vat, 0) %}
          {% endif %}
          {% set total_rate = ((rate + tax) * ((1+(vat/100)))) | round(4, default=0) %}
          {{ total_rate }}

  - sensor:
      # TWEAK. Since the unit from spot sensor, is SEK/kWh we cannot use it directly in: electrical_consumption_rate_summary
      # We otherwise will get: WARNING (Recorder) [homeassistant.components.sensor.recorder] The unit of sensor.electrical_consumption_ratesummary (öre/kWh) does not match the unit of already compiled statistics (SEK/kWh). Generation of long term statistics will be suppressed unless the unit changes back to SEK/kWh.
      # Therefore we create a intermediary sensor to get it to [öre/kWh].
      # 20251011: This will be able to manage 15 minute changes when the NordPool-integration is updated.
      - name: Electrical consumption spot sensor intermediary
        unique_id: electrical_consumption_spot_sensor_intermediary
        state_class: measurement
        state: >
          {% set value = states(states('input_text.electrical_consumption_spot_sensor')) %}
          {% if (value != 'unknown' or value != 'unavailable') %}
          {%   set spot = float(value, 0) * 100 %}
          {% else %}
          {%   set spot = 0 %}
          {% endif %}
          {{ spot }}

  - sensor:
      # TWEAK. Since the unit from spot sensor, is SEK/kWh we cannot use it directly in: electrical_consumption_rate_summary
      # We otherwise will get: WARNING (Recorder) [homeassistant.components.sensor.recorder] The unit of sensor.electrical_consumption_ratesummary (öre/kWh) does not match the unit of already compiled statistics (SEK/kWh). Generation of long term statistics will be suppressed unless the unit changes back to SEK/kWh.
      # Therefore we create a intermediary sensor to get it to [öre/kWh] for min.
      # 20251011: This will be able to manage 15 minute changes when the NordPool-integration is updated.
      - name: Electrical consumption spot sensor intermediary min
        unique_id: electrical_consumption_spot_sensor_intermediary_min
        state_class: measurement
        state: >
          {% set value = state_attr(states('input_text.electrical_consumption_spot_sensor'), 'min') %}
          {% if (value != 'unknown' or value != 'unavailable') %}
          {%   set spot = float(value, 0) * 100 %}
          {% else %}
          {%   set spot = 0 %}
          {% endif %}
          {{ spot }}

  - sensor:
      # TWEAK. Since the unit from spot sensor, is SEK/kWh we cannot use it directly in: electrical_consumption_rate_summary
      # We otherwise will get: WARNING (Recorder) [homeassistant.components.sensor.recorder] The unit of sensor.electrical_consumption_ratesummary (öre/kWh) does not match the unit of already compiled statistics (SEK/kWh). Generation of long term statistics will be suppressed unless the unit changes back to SEK/kWh.
      # Therefore we create a intermediary sensor to get it to [öre/kWh] for max.
      # 20251011: This will be able to manage 15 minute changes when the NordPool-integration is updated.
      - name: Electrical consumption spot sensor intermediary max
        unique_id: electrical_consumption_spot_sensor_intermediary_max
        state_class: measurement
        state: >
          {% set value = state_attr(states('input_text.electrical_consumption_spot_sensor'), 'max') %}
          {% if (value != 'unknown' or value != 'unavailable') %}
          {%   set spot = float(value, 0) * 100 %}
          {% else %}
          {%   set spot = 0 %}
          {% endif %}
          {{ spot }}

  - sensor:
      # TWEAK. Since the unit from spot sensor, is SEK/kWh we cannot use it directly in: electrical_consumption_rate_summary
      # We otherwise will get: WARNING (Recorder) [homeassistant.components.sensor.recorder] The unit of sensor.electrical_consumption_ratesummary (öre/kWh) does not match the unit of already compiled statistics (SEK/kWh). Generation of long term statistics will be suppressed unless the unit changes back to SEK/kWh.
      # Therefore we create a intermediary sensor to get it to [öre/kWh] for mean.
      # 20251011: This will be able to manage 15 minute changes when the NordPool-integration is updated.
      - name: Electrical consumption spot sensor intermediary mean
        unique_id: electrical_consumption_spot_sensor_intermediary_mean
        state_class: measurement
        state: >
          {% set value = state_attr(states('input_text.electrical_consumption_spot_sensor'), 'mean') %}
          {% if (value != 'unknown' or value != 'unavailable') %}
          {%   set spot = float(value, 0) * 100 %}
          {% else %}
          {%   set spot = 0 %}
          {% endif %}
          {{ spot }}

  - sensor:
      # TWEAK. Since the unit from spot sensor, is SEK/kWh we cannot use it directly in: electrical_consumption_rate_summary
      # We otherwise will get: WARNING (Recorder) [homeassistant.components.sensor.recorder] The unit of sensor.electrical_consumption_ratesummary (öre/kWh) does not match the unit of already compiled statistics (SEK/kWh). Generation of long term statistics will be suppressed unless the unit changes back to SEK/kWh.
      # Therefore we create a intermediary sensor to get it to [öre/kWh].
      # 20251011: This will be able to manage 15 minute changes when the NordPool-integration is updated.
      - name: Electrical consumption average spot sensor intermediary
        unique_id: electrical_consumption_average_spot_sensor_intermediary
        state_class: measurement
        state: >
          {% set value = state_attr(states('input_text.electrical_consumption_spot_sensor'), 'average') %}
          {% if (value != 'unknown' or value != 'unavailable' or value != 'None') %}
          {%   set spot = float(value, 0) * 100 %}
          {% else %}
          {%   set spot = 0 %}
          {% endif %}
          {{ spot }}

  - sensor:
      # We want to keep track of total electrical consumption rate.
      # 20251011: This will be able to manage 15 minute changes when the NordPool-integration is updated.
      - name: Electrical consumption rate summary
        unique_id: electrical_consumption_rate_summary
        unit_of_measurement: "öre/kWh"
        state_class: measurement
        icon: mdi:transmission-tower-import
        state: >
          {% if (states('input_boolean.electrical_consumption_rate_toggle') == "on") %}
          {%   set rate = states('input_number.electrical_consumption_rate_manual') %}
          {%   if (rate == 'unknown' or rate == 'unavailable') %}
          {%     set rate = 0 %}
          {%   else %}
          {%     set rate = float(rate, 0) %}
          {%   endif %}
          {% else %}
          {%   set rate = states('sensor.electrical_consumption_spot_sensor_intermediary') %}
          {%   if (rate == 'unknown' or rate == 'unavailable') %}
          {%     set rate = 0 %}
          {%   else %}
          {%     set rate = float(rate, 0) %}
          {%   endif %}
          {% endif %}
          {% set compensation = states('input_number.electrical_consumption_rate_compensation_manual') %}
          {% if (compensation == 'unknown' or compensation == 'unavailable') %}
          {%   set compensation = 0 %}
          {% else %}
          {%   set compensation = float(compensation, 0) %}
          {% endif %}
          {% set compensated_rate = rate + compensation  %}
          {% set tax = states('input_number.electrical_consumption_rate_tax') %}
          {% if (tax == 'unknown' or tax == 'unavailable') %}
          {%   set tax = 0 %}
          {% else %}
          {%   set tax = float(tax, 0) %}
          {% endif %}
          {% set vat = states('input_number.electrical_consumption_rate_vat') %}
          {% if (vat == 'unknown' or vat == 'unavailable') %}
          {%   set vat = 0 %}
          {% else %}
          {%   set vat = float(vat, 0) %}
          {% endif %}
          {% set total_rate = ((compensated_rate + tax) * ((1+(vat/100)))) | round(2, default=0) %}
          {{ total_rate }}

  - sensor:
      # We want to keep track of total electrical consumption rate, min.
      # 20251011: This will be able to manage 15 minute changes when the NordPool-integration is updated.
      - name: Electrical consumption rate summary min
        unique_id: electrical_consumption_rate_summary_min
        unit_of_measurement: "öre/kWh"
        state_class: measurement
        icon: mdi:transmission-tower-import
        state: >
          {% if (states('input_boolean.electrical_consumption_rate_toggle') == "on") %}
          {%   set rate = states('input_number.electrical_consumption_rate_manual') %}
          {%   if (rate == 'unknown' or rate == 'unavailable') %}
          {%     set rate = 0 %}
          {%   else %}
          {%     set rate = float(rate, 0) %}
          {%   endif %}
          {% else %}
          {%   set rate = states('sensor.electrical_consumption_spot_sensor_intermediary_min') %}
          {%   if (rate == 'unknown' or rate == 'unavailable') %}
          {%     set rate = 0 %}
          {%   else %}
          {%     set rate = float(rate, 0) %}
          {%   endif %}
          {% endif %}
          {% set compensation = states('input_number.electrical_consumption_rate_compensation_manual') %}
          {% if (compensation == 'unknown' or compensation == 'unavailable') %}
          {%   set compensation = 0 %}
          {% else %}
          {%   set compensation = float(compensation, 0) %}
          {% endif %}
          {% set compensated_rate = rate + compensation  %}
          {% set tax = states('input_number.electrical_consumption_rate_tax') %}
          {% if (tax == 'unknown' or tax == 'unavailable') %}
          {%   set tax = 0 %}
          {% else %}
          {%   set tax = float(tax, 0) %}
          {% endif %}
          {% set vat = states('input_number.electrical_consumption_rate_vat') %}
          {% if (vat == 'unknown' or vat == 'unavailable') %}
          {%   set vat = 0 %}
          {% else %}
          {%   set vat = float(vat, 0) %}
          {% endif %}
          {% set total_rate = ((compensated_rate + tax) * ((1+(vat/100)))) | round(2, default=0) %}
          {{ total_rate }}

  - sensor:
      # We want to keep track of total electrical consumption rate, max.
      # 20251011: This will be able to manage 15 minute changes when the NordPool-integration is updated.
      - name: Electrical consumption rate summary max
        unique_id: electrical_consumption_rate_summary_max
        unit_of_measurement: "öre/kWh"
        state_class: measurement
        icon: mdi:transmission-tower-import
        state: >
          {% if (states('input_boolean.electrical_consumption_rate_toggle') == "on") %}
          {%   set rate = states('input_number.electrical_consumption_rate_manual') %}
          {%   if (rate == 'unknown' or rate == 'unavailable') %}
          {%     set rate = 0 %}
          {%   else %}
          {%     set rate = float(rate, 0) %}
          {%   endif %}
          {% else %}
          {%   set rate = states('sensor.electrical_consumption_spot_sensor_intermediary_max') %}
          {%   if (rate == 'unknown' or rate == 'unavailable') %}
          {%     set rate = 0 %}
          {%   else %}
          {%     set rate = float(rate, 0) %}
          {%   endif %}
          {% endif %}
          {% set compensation = states('input_number.electrical_consumption_rate_compensation_manual') %}
          {% if (compensation == 'unknown' or compensation == 'unavailable') %}
          {%   set compensation = 0 %}
          {% else %}
          {%   set compensation = float(compensation, 0) %}
          {% endif %}
          {% set compensated_rate = rate + compensation  %}
          {% set tax = states('input_number.electrical_consumption_rate_tax') %}
          {% if (tax == 'unknown' or tax == 'unavailable') %}
          {%   set tax = 0 %}
          {% else %}
