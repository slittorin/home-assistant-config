    unit_of_measurement: "öre/kWh"
  electrical_consumption_rate_tax:
    name: "Electrical consumption rate tax"
    icon: mdi:transmission-tower-import
    mode: box
    min: 0
    step: 0.001
    max: 1000
    unit_of_measurement: "öre/kWh"
  electrical_consumption_rate_vat:
