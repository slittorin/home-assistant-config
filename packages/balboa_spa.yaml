      #    {% set consumption = states('sensor.balboa_spa_heater_consumption_hour') %}
      #    {% set cost = states('sensor.electrical_distribution_consumption_rate_summary_sek') %}
      #    {% if (consumption == 'unknown' or consumption == 'unavailable') %}
