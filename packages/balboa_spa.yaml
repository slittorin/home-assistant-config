  # Send email when Balboa spa is not online.
  # Dependency: A ping sensor towards 192.168.4.20 through GUI.
  - alias: "Send email when Balboa Spa is not online"
    trigger:
      - platform: state
        entity_id: binary_sensor.192_168_4_20
        to: "off"
        for:
          seconds: 180 # Must stay OFF for 180 seconds before triggering
    action:
      - service: notify.email_notification
        data:
          title: "Balboa Spa is offline"
          message: "HA cannot ping Balboa Spa on 192.168.4.20 for 180 seconds. Please turn power off at the Spa, and on after 10 seconds."
