input_text:
  balboa_spa_temperature_sensor:
    name: "Name of sensor for spa temperatures (full name)"
    icon: mdi:thermometer-lines
  # We want to track spa consumption each 15-minute during the hour
  # Index 0 through 3 is each 15 minute.
  # unit_of_measurement: "kWh"
  balboa_spa_circulationpump_heater_hour_array:
    name: "Array for calculating correct 15 minute spa consumption"
    icon: mdi:application-array-outline
  # We want to track the production for the spa each 15-minute during the hour
  # Index 0 through 3 is each 15 minute.
  # Index 4 is the summary of cost for each 15 minute during the hour.
  # unit_of_measurement: "SEK"
  balboa_spa_circulationpump_heater_cost_hour_array:
    name: "Array for calculating correct 15 minute cost for spa consumption"
    icon: mdi:application-array-outline

