          {% endif %}
          {{ value }}
      # We save shelly_heatpump_upstairs_power_mean
      # We will therefore not capture the last seconds for the hour, but that will have minor impact as we gather data for 60 minutes.
      - name: shelly_heatpump_upstairs_power_mean_hour
        device_class: "power"
        unit_of_measurement: "W"
        state_class: measurement
        state: >
          {% set input = states('sensor.shelly_heatpump_upstairs_power_mean') %}
          {% if (input == 'unknown' or input == 'unavailable') %}
          {%   set value = 0 %}
          {% else %}
          {%   set value = float(input, default=0) %}
          {% endif %}
          {{ value }}
      # We save shelly_heatpumps_total_increasing_energy
      # We will therefore not capture the last seconds for the hour, but that will have minor impact as we gather data for 60 minutes.
      - name: shelly_heatpumps_total_increasing_energy_hour
        device_class: "energy"
        unit_of_measurement: "kWh"
        state_class: total_increasing
        state: >
          {% set input = states('sensor.shelly_heatpumps_total_increasing_energy') %}
          {% if (input == 'unknown' or input == 'unavailable') %}
